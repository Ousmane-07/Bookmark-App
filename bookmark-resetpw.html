<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="bookmark-resetpw.css">
    <title>Boomark-Manager Login Page</title>
     <script src="https://kit.fontawesome.com/a6df8c915e.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <div class="top-section">
        <img src="bookmark-manager-logo.svg">
        <p>Bookmark Manager</p>
        </div>
        <div class="main-section">
            <p class="main-header">Forgot your password?</p>
            <p class ="main-header-welcome">Enter your email address below and we'll send you a link to reset your password.</p>
            <div class="input-section">
                <p class="email input-header">Email<span class="asterick">*</span></p>
                <input type="text" class="input">
                <button class = "login-btn">Send reset link</button>
            </div>
        </div>
        <div class="bottom-section">
            <a href="bookmark-login.html" class="back-to-login">Back to login</a>
        </div>
    </div>
    
    

    <script src="bookmark-login.js" defer></script>

</body>
</html>
