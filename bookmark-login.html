<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="bookmark-login.css">
    <title>Boomark-Manager Login Page</title>
     <script src="https://kit.fontawesome.com/a6df8c915e.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <div class="top-section">
        <img src="bookmark-manager-logo.svg">
        <p>Bookmark Manager</p>
        </div>
        <div class="main-section">
            <p class="main-header">Log in to your account</p>
            <p class ="main-header-welcome">Welcome back! Please enter your details.</p>
            <div class="input-section">
                <p class="email input-header">Email</p>
                <input type="text" class="email_input">
                <p class="password input-header">Password</p>
                <input type="text" class="password_input">
                <button class = "login-btn">Log in</button>
                <div class="login-error"></div>
            </div>
        </div>
        <div class="bottom-section">
            <div class="forgot-password">
                <p>Forgot password? <a href="bookmark-resetpw.html" class="auth-span">Reset it</a></p>
                
            </div>
            <div class="no-account">
                <p>Don't have an account? <a href="bookmark-signup.html" class="auth-span">Sign up</a></p>
            </div>
        </div>
    </div>
    
    

    <script src="bookmark-login.js" defer></script>

</body>
</html>
