<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="bookmark-home.css">
    <title>Boomark-Manager Login Page</title>
     <script src="https://kit.fontawesome.com/a6df8c915e.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="side-navigation-bar">
        <header>
            <div class="logo-header-text">
            <a href="bookmark-home.html" class="logo">
                <img src="bookmark-manager-logo.svg">
                <span class="header-text">Bookmark Manager</span>
            </a>
            
            </div>
        </header>

        <section class="top-main">
            <a href="" class="top-main-container">
                <img src="home-line.svg">

            </a>
            <a href="" class="top-main-container">
                <img src="icon.svg">
                <span class="top-main-text">Archived</span>
            </a>
        </section>

        <section class="content-main">
            <p class="content-header">TAGS</p>
            <div class="main-content-container">
                <div class="checkbox-and-title">
                    <img src="_Checkbox base.svg">
                    <p class="main-content-title">AI</p>
                </div>
                 <p class="number">1</p>
            </div>
            <div class="main-content-container">
                <div class="checkbox-and-title">
                    <img src="_Checkbox base.svg">
                    <p class="main-content-title">Community</p>
                </div>
                 <p class="number">5</p>
            </div>
            <div class="main-content-container">
                <div class="checkbox-and-title">
                    <img src="_Checkbox base.svg">
                    <p class="main-content-title">Compatibility</p>
                </div>
                 <p class="number">1</p>
            </div>
            <div class="main-content-container">
                <div class="checkbox-and-title">
                    <img src="_Checkbox base.svg">

                </div>
                 <p class="number">6</p>

            <div class="main-content-container">
                <div class="checkbox-and-title">

            <div class="main-content-container">
                <div class="checkbox-and-title">

                <div class="checkbox-and-title">

                </div>

                <div class="checkbox-and-title">
                    <img src="_Checkbox base.svg">

                </div>

                <div class="checkbox-and-title">
                    <img src="_Checkbox base.svg">
                    <p class="main-content-title">Performance</p>
                </div>
                 <p class="number">2</p>
            </div>
            <div class="main-content-container">
                <div class="checkbox-and-title">
                    <img src="_Checkbox base.svg">
                    <p class="main-content-title">Practice</p>
                </div>
                 <p class="number">5</p>
            </div>

                <div class="checkbox-and-title">
                    <img src="_Checkbox base.svg">

                </div>

                <div class="checkbox-and-title">

            <div class="main-content-container">

                    <img src="_Checkbox base.svg">
                    <p class="main-content-title">Tutorial</p>
                </div>
                 <p class="number">3</p>

    <nav class="top-navigation-bar">
        <div class="top-navigation-container">
            <div class="input-container">
                <img src="search-md.svg">
                <input type="text" class="input" placeholder="Search by title...">
            </div>
            <div class="button-and-picture">
                <button class="bookmark-btn">
                    <img src="plus.svg" alt="">
                    Add Bookmark
                </button>
                <img src="light-prof-pic.png" alt="">
            </div>
        </div>
    </nav>

    <div class="main-container">
        <div class="top-main">
            <p>All Bookmarks</p>
            <button class="top-main-sort-button">
                <img src="up-down.svg" alt="">
                Sort by
            </button>
        </div>
        
    </div>
    
    

    <script src="bookmark-login.js" defer></script>
