<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="bookmark-signup.css">
    <title>Boomark-Manager Login Page</title>
     <script src="https://kit.fontawesome.com/a6df8c915e.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <div class="top-section">
        <img src="bookmark-manager-logo.svg">
        <p>Bookmark Manager</p>
        </div>
        <div class="main-section">
            <p class="main-header">Create your account</p>
            <p class ="main-header-welcome">Join us and start saving your favorite links — organized, searchable, and always within reach. </p>
            <div class="input-section">
                <p class="full-name input-header">Full name <span class="asterick">*</span></p>
                <input type="text" class="input">
                <p class="email input-header">Email <span class="asterick">*</span></p>
                <input type="text" class="input">
                <p class="password input-header">Password <span class="asterick">*</span></p>
                <input type="text" class="input">
                <button class = "login-btn">Create Account</button>
            </div>
        </div>
        <div class="bottom-section">
        
            <div class="account-true">
                <p>Already have an account? <a href="#" class="auth-span">Log in</a></p>
            </div>
        </div>
    </div>
    
    

    <script src="bookmark-login.js" defer></script>

</body>
</html>
